name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: linux-amd64
            cc: gcc
            arch_flags: ""
          - target: linux-arm64
            cc: aarch64-linux-gnu-gcc
            arch_flags: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install cross-compiler (arm64)
        if: matrix.target == 'linux-arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: make CC=${{ matrix.cc }}

      - name: Rename binary
        run: cp sheer sheer-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: sheer-${{ matrix.target }}
          path: sheer-${{ matrix.target }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum sheer-linux-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sheer-linux-*
            checksums.txt
          generate_release_notes: true
